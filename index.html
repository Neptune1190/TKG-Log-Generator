<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TKG Log Generator</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
  body {
    font-family: monospace;
    background: #0e0e10;
    color: #f4f4f4;
    padding: 20px;
  }

  h2 { color: #ff5555; }

  label {
    display:block;
    margin-top:10px;
  }

  input, textarea, select {
    width:100%;
    padding:8px;
    background:#1e1e22;
    color:#fff;
    border:1px solid #333;
    border-radius:5px;
    box-sizing:border-box;
  }

  textarea {
    min-height:140px;
    resize:vertical;
  }

  button {
    margin-top:10px;
    padding:10px 14px;
    background:#ff5555;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
  }

  #copyBtn { background:#4caf50; margin-left:10px; }
  #deleteBtn { background:#b91c1c; margin-left:10px; }
  #shareBtn { background:#3b82f6; margin-left:10px; }
  #addFieldBtn { background:#7c3aed; margin-left:10px; }

  .row {
    display:flex;
    gap:15px;
    flex-wrap:wrap;
  }

  .panel {
    flex:1;
    min-width:340px;
  }

  .fieldBox {
    background:#15151a;
    border:1px solid #333;
    padding:10px;
    border-radius:6px;
    margin-top:10px;
  }

  .fieldRow {
    display:flex;
    gap:10px;
    margin-top:6px;
    align-items:center;
  }

  .smallSelect { width:40%; }
  .smallInput { width:60%; }

  .clearBtn {
    background:#444;
    padding:6px 10px;
    margin-top:0;
  }

  #output {
    background:#1e1e22;
    color:#00ff9c;
    padding:10px;
    border-radius:5px;
    border:1px solid #333;
    min-height:300px;
    white-space:pre-wrap;
  }

  footer {
    margin-top:25px;
    text-align:center;
    color:#777;
    font-size:0.85em;
  }

  .builderBox {
    background:#15151a;
    border:1px solid #333;
    padding:12px;
    border-radius:6px;
    margin-top:15px;
  }

  .builderRow {
    display:flex;
    gap:10px;
    margin-top:10px;
  }

  @media(max-width:900px){
    .row {
      flex-direction:column;
    }
  }
</style>
</head>

<body>

<h2>☰ TKG Log Generator ☰</h2>

<div class="row">

  <div class="panel">

    <label>Template</label>
    <select id="templateSelect"></select>

    <label>Time Format</label>
    <select id="timeFormat">
      <option value="12">12 Hour (AM/PM)</option>
      <option value="24">24 Hour</option>
    </select>

    <label>Template Editor</label>
    <textarea id="templateInput"></textarea>

    <button id="saveBtn">Save / Overwrite</button>
    <button id="deleteBtn">Delete</button>
    <button id="shareBtn">Share Template</button>

    <div class="builderBox">

      <h3>Visual Template Builder</h3>

      <div class="builderRow">
        <input id="builderLabel" placeholder="Label (Example: Host)">
        <input id="builderField" placeholder="Field Name (Example: Host)">
      </div>

      <div class="builderRow">
        <select id="builderType">
          <option value="text">text</option>
          <option value="textarea">textarea</option>
          <option value="timestamp">timestamp</option>
        </select>

        <button id="addFieldBtn">Add Field</button>
      </div>

    </div>

    <h3>Fields</h3>
    <div id="fieldEditor"></div>

  </div>

  <div class="panel">

    <h3>Generated Form</h3>
    <div id="formContainer"></div>

    <button id="generateBtn">Generate</button>
    <button id="copyBtn">Copy</button>

    <h3>Output</h3>
    <div id="output"></div>

  </div>

</div>

<footer>
  Made with ❤️ by Neptune6866, with inspiration from hxyqt
</footer>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script>

(() => {

  const templateSelect = document.getElementById("templateSelect");
  const templateInput = document.getElementById("templateInput");
  const fieldEditor = document.getElementById("fieldEditor");
  const formContainer = document.getElementById("formContainer");
  const output = document.getElementById("output");
  const timeFormat = document.getElementById("timeFormat");

  let fieldState = [];

  const getTemplates = () =>
    JSON.parse(localStorage.getItem("tkgTemplates") || "[]");

  const saveTemplates = (t) =>
    localStorage.setItem("tkgTemplates", JSON.stringify(t));

  function encodeTemplate(obj) {
    return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }

  function decodeTemplate(str) {
    return JSON.parse(decodeURIComponent(escape(atob(str))));
  }

  function getFlatpickrConfig(defaultValue = null) {
    return {
      enableTime: true,
      dateFormat: "Y-m-d H:i",
      time_24hr: timeFormat.value === "24",
      defaultDate: defaultValue || null
    };
  }

  function renderDropdown() {
    const t = getTemplates();

    templateSelect.innerHTML =
      `<option value="new">+ New Template</option>` +
      t.map((x,i)=>`<option value="${i}">${x.name}</option>`).join("");
  }

  function extract(template, saved = {}) {

    const matches = [...template.matchAll(/{(.*?)}/g)];

    return [...new Map(matches.map(m => {

      const parts = m[1].split(":");

      const name = parts[0];
      const type = parts[1] || "text";
      const style = parts[2] || "";
      const offset = parts[3] || "";

      const s = saved[name] || {};

      return [name, {
        name,
        type: s.type || type || "text",
        default: s.default || "",
        style: s.style || style || "",
        offset: s.offset || offset || ""
      }];

    })).values()];
  }

  function syncTemplateFromFields() {

    let tpl = templateInput.value;

    fieldState.forEach(f => {
      tpl = tpl.replace(new RegExp(`{${f.name}(:.*?)?}`, "g"), `{${f.name}}`);
    });

    fieldState.forEach(f => {

      if (f.type !== "text") {

        const stylePart = f.type === "timestamp" && f.style
          ? `:${f.style}`
          : "";

        const offsetPart = f.type === "timestamp" && f.offset
          ? `:${f.offset}`
          : "";

        tpl = tpl.replaceAll(
          `{${f.name}}`,
          `{${f.name}:${f.type}${stylePart}${offsetPart}}`
        );
      }
    });

    templateInput.value = tpl;
  }

  function renderFields() {

    fieldEditor.innerHTML = "";

    fieldState.forEach((f,i)=>{

      const box = document.createElement("div");
      box.className = "fieldBox";

      let defaultHTML = "";

      if (f.type === "timestamp") {

        defaultHTML = `
          <div class="fieldRow">
            <input id="d-${f.name}" placeholder="Pick default...">
            <button class="clearBtn" type="button" id="clear-${f.name}">
              Clear
            </button>
          </div>

          <label>Auto Offset</label>
          <input
            value="${f.offset || ""}"
            placeholder="+3h / +1d / +30m"
            onchange="updateOffset(${i}, this.value)"
          >
        `;

      } else {

        defaultHTML = `
          <input
            value="${f.default || ""}"
            onchange="updateDefault(${i}, this.value)"
          >
        `;
      }

      box.innerHTML = `
        <label>${f.name}</label>

        <div class="fieldRow">

          <select
            onchange="updateType(${i}, this.value)"
            class="smallSelect"
          >
            <option ${f.type==="text"?"selected":""}>text</option>
            <option ${f.type==="textarea"?"selected":""}>textarea</option>
            <option ${f.type==="timestamp"?"selected":""}>timestamp</option>
          </select>

          <input class="smallInput" value="${f.name}" disabled />

        </div>

        <label>Default value</label>

        ${defaultHTML}
      `;

      fieldEditor.appendChild(box);

      if (f.type === "timestamp") {

        const el = document.getElementById(`d-${f.name}`);

        const fp = flatpickr(
          el,
          getFlatpickrConfig(f.default)
        );

        if (f.default) {
          setTimeout(() => fp.setDate(f.default, true), 0);
        }

        fp.config.onChange.push((selectedDates) => {
          if (!selectedDates.length) return;

          fieldState[i].default =
            selectedDates[0].toISOString();

          syncFormTimestamp(f.name, fieldState[i].default);
        });

        document.getElementById(`clear-${f.name}`).onclick = () => {
          fieldState[i].default = "";
          fp.clear();
          syncFormTimestamp(f.name, "");
        };
      }

    });

  }

  function renderForm() {

    formContainer.innerHTML = "";

    fieldState.forEach(f=>{

      const box = document.createElement("div");

      box.className = "fieldBox";

      box.innerHTML = `<label>${f.name}</label>`;

      if (f.type === "timestamp") {

        const i = document.createElement("input");
        i.id = `f-${f.name}`;
        box.appendChild(i);

        const fp = flatpickr(i, getFlatpickrConfig(f.default));

        if (f.default) {
          setTimeout(() => fp.setDate(f.default, true), 0);
        }

        const s = document.createElement("select");
        s.id = `s-${f.name}`;

        [
          ["R","Relative"],
          ["f","Short Date/Time"],
          ["F","Long Date/Time"],
          ["d","Short Date"],
          ["D","Long Date"],
          ["t","Short Time"],
          ["T","Long Time"]
        ].forEach(v=>{

          const o = document.createElement("option");

          o.value = v[0];
          o.textContent = `${v[0]} — ${v[1]}`;

          if (v[0] === (f.style || "R")) o.selected = true;

          s.appendChild(o);

        });

        s.onchange = () => {
          fieldState.find(x => x.name === f.name).style = s.value;
          syncTemplateFromFields();
        };

        box.appendChild(s);

      } else {

        if (f.type === "textarea") {

          const t = document.createElement("textarea");
          t.id = `f-${f.name}`;
          t.value = f.default || "";
          box.appendChild(t);

        } else {

          const i = document.createElement("input");
          i.id = `f-${f.name}`;
          i.value = f.default || "";
          box.appendChild(i);

        }

      }

      formContainer.appendChild(box);

    });

  }

  function syncFormTimestamp(name, value) {

    const el = document.getElementById(`f-${name}`);

    if (el && el._flatpickr) {
      el._flatpickr.setDate(value || null, true);
    }

  }

  function discordTime(date, style) {

    return `<t:${Math.floor(
      new Date(date).getTime()/1000
    )}:${style}>`;

  }

  function generate() {

    let tpl = templateInput.value;

    fieldState.forEach(f=>{

      const el = document.getElementById(`f-${f.name}`);

      let v = el ? el.value.trim() : "";

      if (f.type === "timestamp") {

        let dateObj;

        if (v) {
          dateObj = new Date(v);
        } else {
          dateObj = new Date();
        }

        if (f.offset) {

          const match = f.offset.match(/^([+-]?\d+)([mhd])$/);

          if (match) {

            const amount = parseInt(match[1]);
            const unit = match[2];

            if (unit === "m") {
              dateObj.setMinutes(dateObj.getMinutes() + amount);
            }

            if (unit === "h") {
              dateObj.setHours(dateObj.getHours() + amount);
            }

            if (unit === "d") {
              dateObj.setDate(dateObj.getDate() + amount);
            }

          }

        }

        const s = document.getElementById(`s-${f.name}`).value
          || f.style
          || "R";

        v = discordTime(dateObj,s);
      }

      tpl = tpl.replaceAll(`{${f.name}}`, v);

      tpl = tpl.replaceAll(
        `{${f.name}:${f.type}}`,
        v
      );

      tpl = tpl.replaceAll(
        `{${f.name}:${f.type}:${f.style || ""}:${f.offset || ""}}`,
        v
      );

    });

    tpl = tpl
      .split("\n")
      .filter(line => {

        const cleaned = line.trim();

        if (!cleaned) return false;

        const parts = cleaned.split(":");

        if (parts.length < 2) return true;

        const afterColon =
          parts.slice(1).join(":").trim();

        return afterColon !== "";

      })
      .join("\n");

    output.textContent = tpl;

  }

  function saveTemplate() {

    const name = prompt("Template name:");

    if (!name) return;

    const templates = getTemplates();

    const fieldsMap = {};

    fieldState.forEach(f => {
      fieldsMap[f.name] = {
        type: f.type,
        default: f.default || "",
        style: f.style || "",
        offset: f.offset || ""
      };
    });

    const newTpl = {
      name,
      template: templateInput.value,
      fields: fieldsMap
    };

    const i = templates.findIndex(t => t.name === name);

    if (i !== -1) templates[i] = newTpl;
    else templates.push(newTpl);

    saveTemplates(templates);

    renderDropdown();
  }

  function shareTemplate() {

    const data = {
      template: templateInput.value,
      fields: fieldState
    };

    const encoded = encodeTemplate(data);

    const url =
      `${location.origin}${location.pathname}?tpl=${encoded}`;

    navigator.clipboard.writeText(url);

    alert("Share link copied!");
  }

  function loadFromURL() {

    const params = new URLSearchParams(location.search);

    const tpl = params.get("tpl");

    if (!tpl) return false;

    try {

      const data = decodeTemplate(tpl);

      templateInput.value = data.template;

      fieldState = data.fields || [];

      renderFields();
      renderForm();

      return true;

    } catch {

      return false;
    }
  }

  function promptImport() {

    setTimeout(() => {
      const ok = confirm("This is a shared template. Save it locally?");
      if (!ok) return;
      saveTemplate();
    }, 200);
  }

  function deleteTemplate() {

    const i = templateSelect.value;

    if (i === "new") return;

    const t = getTemplates();

    if (!confirm("Delete template?")) return;

    t.splice(i,1);

    saveTemplates(t);

    location.reload();
  }

  function addVisualField() {

    const label =
      document.getElementById("builderLabel").value.trim();

    const field =
      document.getElementById("builderField").value.trim();

    const type =
      document.getElementById("builderType").value;

    if (!label || !field) return;

    let token = `{${field}}`;

    if (type !== "text") {
      token = `{${field}:${type}}`;
    }

    const line = `${label}: ${token}`;

    if (templateInput.value.trim()) {
      templateInput.value += "\n" + line;
    } else {
      templateInput.value = line;
    }

    fieldState = extract(templateInput.value, {});

    renderFields();
    renderForm();

    document.getElementById("builderLabel").value = "";
    document.getElementById("builderField").value = "";
  }

  window.updateType = (i,type) => {
    fieldState[i].type = type;
    renderForm();
    syncTemplateFromFields();
  };

  window.updateDefault = (i,val) => {
    fieldState[i].default = val;
  };

  window.updateOffset = (i,val) => {
    fieldState[i].offset = val.trim();
    syncTemplateFromFields();
  };

  function loadTemplate(index) {

    if (index === "new") {
      templateInput.value = "";
      fieldState = [];
      fieldEditor.innerHTML = "";
      formContainer.innerHTML = "";
      return;
    }

    const tpl = getTemplates()[index];

    templateInput.value = tpl.template;

    fieldState = extract(
      tpl.template,
      tpl.fields || {}
    );

    renderFields();
    renderForm();
  }

  templateSelect.onchange =
    () => loadTemplate(templateSelect.value);

  templateInput.addEventListener("input", () => {

    fieldState = extract(templateInput.value, {});

    renderFields();
    renderForm();

  });

  timeFormat.addEventListener("change", () => {
    renderFields();
    renderForm();
  });

  document.getElementById("saveBtn").onclick = saveTemplate;
  document.getElementById("deleteBtn").onclick = deleteTemplate;
  document.getElementById("generateBtn").onclick = generate;
  document.getElementById("shareBtn").onclick = shareTemplate;

  document.getElementById("copyBtn").onclick =
    () => navigator.clipboard.writeText(output.textContent);

  document.getElementById("addFieldBtn").onclick =
    addVisualField;

  const loaded = loadFromURL();

  if (loaded) promptImport();

  renderDropdown();

})();

</script>

</body>
</html>
